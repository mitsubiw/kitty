<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Věštící kočka</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <h1>Věštící kočka</h1>

    <div class="garden" aria-hidden="true">
      <svg viewBox="0 0 800 400" preserveAspectRatio="xMidYMid slice" class="garden-svg" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0%" stop-color="#9AD0FF"/>
            <stop offset="100%" stop-color="#DFF3FF"/>
          </linearGradient>
          <linearGradient id="grass" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0%" stop-color="#79C267"/>
            <stop offset="100%" stop-color="#4BA03A"/>
          </linearGradient>
        </defs>
        <rect width="100%" height="100%" fill="url(#sky)"/>
        <g transform="translate(0,220)">
          <rect width="100%" height="180" fill="url(#grass)"/>
          <!-- simple flowers -->
          <g fill="#FFD1E3">
            <circle cx="120" cy="40" r="6" fill="#FF8AB6"/>
            <circle cx="200" cy="60" r="6" fill="#FFB86B"/>
            <circle cx="320" cy="50" r="6" fill="#FFD166"/>
            <circle cx="460" cy="45" r="6" fill="#FF8AB6"/>
            <circle cx="600" cy="55" r="6" fill="#FFB86B"/>
          </g>
        </g>
      </svg>
    </div>

    <div class="cat-container" id="cat" role="button" tabindex="0" aria-label="Klikni na kočku pro věštbu">
      <svg viewBox="0 0 400 400" class="cat-svg" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
          <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000" flood-opacity="0.18"/>
          </filter>
        </defs>
        <defs>
          <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000" flood-opacity="0.18"/>
          </filter>
        </defs>

        <!-- ears -->
        <path class="part color-1" d="M120 90 L85 30 L155 55 Z" filter="url(#shadow)"/>
        <path class="part color-2" d="M280 90 L315 30 L245 55 Z" filter="url(#shadow)"/>

        <!-- face -->
        <path class="part color-3" d="M100 100 C90 170 130 240 200 245 C270 240 310 170 300 100 C260 60 140 60 100 100 Z" filter="url(#shadow)"/>

        <!-- body -->
        <ellipse class="part color-4" cx="200" cy="305" rx="110" ry="70" filter="url(#shadow)"/>

        <!-- tabby stripes (overlay, darker) -->
        <g class="stripes">
          <path class="part color-8" d="M150 120 C130 140 120 170 140 190" opacity="0.95"/>
          <path class="part color-8" d="M175 110 C160 135 160 165 180 185" opacity="0.95"/>
          <path class="part color-8" d="M210 115 C200 140 200 170 220 188" opacity="0.95"/>
          <path class="part color-8" d="M240 130 C230 150 235 175 255 190" opacity="0.95"/>
          <path class="part color-8" d="M270 150 C250 165 250 190 270 205" opacity="0.95"/>
          <path class="part color-8" d="M180 220 C160 230 150 250 170 260" opacity="0.95"/>
          <path class="part color-8" d="M230 220 C210 230 200 250 220 260" opacity="0.95"/>
        </g>

        <!-- tail -->
        <path class="part color-5" d="M320 260 C360 250 380 220 370 190 C360 160 320 150 300 170" stroke-linecap="round" stroke-width="18" fill="none" class="tail"/>


        <!-- left eye -->
        <ellipse class="part color-6" cx="155" cy="150" rx="24" ry="18"/>
        <!-- right eye -->
        <ellipse class="part color-7" cx="245" cy="150" rx="24" ry="18"/>

        <!-- pupils (dark) and highlights -->
        <ellipse class="pupil" cx="155" cy="152" rx="8" ry="10" fill="#111"/>
        <ellipse class="pupil" cx="245" cy="152" rx="8" ry="10" fill="#111"/>
        <circle class="eye-highlight" cx="150" cy="146" r="3" fill="#fff" opacity="0.9"/>
        <circle class="eye-highlight" cx="240" cy="146" r="3" fill="#fff" opacity="0.9"/>

        <!-- nose -->
        <path class="part color-10" d="M195 175 L205 175 L200 183 Z"/>

        <!-- mouth/whisker area -->
        <path class="part stroke" d="M180 188 Q200 198 220 188" stroke-width="2" stroke-linecap="round" fill="none"/>
        <path class="part stroke" d="M140 185 Q120 180 100 185" stroke-width="2" stroke-linecap="round" fill="none"/>
        <path class="part stroke" d="M260 185 Q280 180 300 185" stroke-width="2" stroke-linecap="round" fill="none"/>

        <!-- shadow under body -->
        <ellipse class="ground-shadow" cx="200" cy="320" rx="95" ry="28" fill="#000" opacity="0.12"/>

        <!-- left paw -->
        <ellipse class="part color-1" cx="140" cy="340" rx="28" ry="16"/>
        <!-- right paw -->
        <ellipse class="part color-2" cx="260" cy="340" rx="28" ry="16"/>

        <!-- whiskers -->
        <g class="whiskers" stroke="#fff" stroke-opacity="0.9" stroke-width="2" stroke-linecap="round">
          <path d="M125 190 Q90 192 70 190"/>
          <path d="M125 200 Q90 202 70 205"/>
          <path d="M275 190 Q310 192 330 190"/>
          <path d="M275 200 Q310 202 330 205"/>
        </g>
      </svg>
    </div>

    <div id="bubble" class="bubble">Zeptej se kočky — napiš otázku níže</div>

    <div class="question-box">
      <textarea id="question" placeholder="Napiš svou otázku..." rows="2"></textarea>
      <div class="controls">
        <button id="ask">Polož otázku</button>
      </div>
      <div class="small">Poznámka: aplikace vyžaduje lokální proxy server s OpenAI klíčem (viz README). Pokud proxy neběží, kočka neodpoví.</div>
    </div>

    <div class="hint">Zeptej se kočky a ona ti odpoví pomocí svého AI agenta.</div>
  </div>

  <script src="script.js"></script>
</body>
</html>
